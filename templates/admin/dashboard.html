{% extends "base.html" %}
{% block title %}管理面板{% endblock %}
{% block content %}
<h2 style="margin-bottom:20px;">管理员控制台</h2>
<div class="flex">
    <div class="card flex-1 text-center">
        <h3 style="font-size:36px; color:#4361ee;">{{ problem_count }}</h3>
        <p class="text-muted">题目总数</p>
    </div>
    <div class="card flex-1 text-center">
        <h3 style="font-size:36px; color:#2ecc71;">{{ submission_count }}</h3>
        <p class="text-muted">提交总数</p>
    </div>
    <div class="card flex-1 text-center">
        <h3 style="font-size:36px; color:#e74c3c;">{{ student_count }}</h3>
        <p class="text-muted">学生人数</p>
    </div>
</div>
<div class="flex mt-16">
    <a href="{{ url_for('create_problem') }}" class="btn btn-primary">+ 创建新题目</a>
    <a href="{{ url_for('manage_problems') }}" class="btn btn-success">题目管理</a>
    <a href="{{ url_for('admin_submissions') }}" class="btn" style="background:#f39c12;color:white;">查看所有提交</a>
</div>
{% endblock %}
